<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ bot_name | default(LIDLbot) }}</title>
    <link rel="stylesheet" href="/static/css/library/fontawesome.all.min.css" />
    <link rel="stylesheet" href="/static/css/library/googlefonts.roboto.css" />
    <link rel="stylesheet" href="/static/css/library/mdb.min.css" />
    <link rel="stylesheet" href="/static/css/chatbot.css" />
  </head>

  <body style="background-color: #eee">
    <div class="container-xl py-5" id="chat-block">
      <div class="row d-flex justify-content-center">
        <div class="col-lg-8">
          <div class="card" style="border-radius: 15px">
            <div
              class="card-header d-flex justify-content-between align-items-center p-3 bg-info text-white border-bottom-0"
              style="
                border-top-left-radius: 15px;
                border-top-right-radius: 15px;
              "
            >
              <p class="mb-0 fw-bold">{{ bot_name | default(LIDLbot) }}</p>
            </div>

            <div class="card-body d-flex flex-column">
              <div id="chat" style="flex-grow: 1; overflow-y: auto;"></div>

              <div class="input-group mb-0">
                <textarea
                  class="form-control flex-grow-1"
                  placeholder="Type message"
                  aria-label="Chat message"
                  id="msgbox"
                  rows="4" 
                  maxlength="150"
                  style="overflow-wrap: break-word;"
                ></textarea>
                <button
                  class="btn btn-primary"
                  type="button"
                  id="submit"
                  style="padding-top: 0.55rem"
                  onclick="submitMsg(true);"
                >
                  Send
                </button>
                <button class="btn" onclick="clearBox()" id="clear-btn">
                  Clear
                </button>
                <div id="myModal" class="modal">
                  <div class="modal-content">
                    <span class="close">&times;</span>
                    <div id="questions">
                      <p>Are you sure you want to skip this question?</p>
                      <div>
                        <button id="yes-button">Yes</button>
                        <button id="no-button">No</button>
                      </div>
                    </div>
                  </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
    </div>
    
    <button id="next" class="hidden">Next</button>
    <script>
      const trials = {{ trials | tojson }}; 
      const nextUrl = '{{ next_url }}';
      const minWords = {{ min_words }};
      let trialIndex = {{ trial_index }};
    </script>
    <script type="text/javascript" src="/static/js/mdb.min.js"></script>
    <script type="text/javascript" src="/static/js/chatbot.js"></script>
  </body>
</html>
